import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.tasks.KotlinCompile

plugins {
    id 'application'
    id 'java'
    id 'org.jetbrains.kotlin.jvm' version '2.3.21'
    id 'org.jetbrains.kotlin.plugin.allopen' version '2.3.21'
    id 'com.google.devtools.ksp' version '2.3.8'
}

group = 'at.hrechny'
version = '2.0.0'

ext {
    set('micronautPlatformVersion', "5.0.0")
    set('testcontainersVersion', "2.0.5")
}

application {
    mainClass = 'at.hrechny.predictionsbot.Application'
    applicationDefaultJvmArgs = ['--enable-native-access=ALL-UNNAMED']
}

kotlin {
    jvmToolchain(25)
}

tasks.withType(KotlinCompile.class).configureEach { KotlinCompile task ->
    task.compilerOptions.jvmTarget.set(JvmTarget.JVM_25)
    task.compilerOptions.javaParameters.set(true)
}

allOpen {
    annotation("io.micronaut.aop.Around")
    annotation("io.micronaut.context.annotation.ConfigurationProperties")
    annotation("io.micronaut.http.annotation.Controller")
    annotation("io.micronaut.transaction.annotation.Transactional")
    annotation("io.micronaut.data.annotation.MappedEntity")
    annotation("jakarta.persistence.Converter")
    annotation("jakarta.persistence.Entity")
    annotation("jakarta.persistence.MappedSuperclass")
    annotation("jakarta.inject.Singleton")
}

ksp {
    arg("micronaut.processing.incremental", "true")
    arg("micronaut.processing.annotations", "at.hrechny.predictionsbot.*")
}

repositories {
    mavenCentral()
    maven { url = uri('https://jitpack.io') }
}

jar {
    manifest {
        attributes('Main-Class': application.mainClass.get())
    }
}

dependencies {
    implementation platform("io.micronaut.platform:micronaut-platform:${micronautPlatformVersion}")
    ksp platform("io.micronaut.platform:micronaut-platform:${micronautPlatformVersion}")
    kspTest platform("io.micronaut.platform:micronaut-platform:${micronautPlatformVersion}")
    testImplementation platform("io.micronaut.platform:micronaut-platform:${micronautPlatformVersion}")

    implementation 'org.jetbrains.kotlin:kotlin-reflect'
    implementation 'io.micronaut:micronaut-http-client'
    implementation 'io.micronaut:micronaut-http-server-netty'
    implementation 'io.micronaut:micronaut-jackson-databind'
    implementation 'io.micronaut:micronaut-runtime'
    implementation 'io.micronaut.cache:micronaut-cache-caffeine'
    implementation 'io.micronaut.data:micronaut-data-hibernate-jpa'
    implementation 'io.micronaut.discovery:micronaut-discovery-client'
    implementation 'io.micronaut.flyway:micronaut-flyway'
    implementation 'io.micronaut.kotlin:micronaut-kotlin-runtime'
    implementation 'io.micronaut.sql:micronaut-jdbc-hikari'
    implementation 'io.micronaut.validation:micronaut-validation'
    implementation 'io.micronaut.views:micronaut-views-freemarker'

    // Tools
    implementation 'com.github.kotlin-telegram-bot.kotlin-telegram-bot:telegram:10.0.0'
    implementation 'com.squareup.retrofit2:retrofit:3.0.0'
    implementation 'com.squareup.retrofit2:converter-gson:3.0.0'
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
    implementation 'org.apache.commons:commons-collections4:4.5.0'
    implementation 'org.apache.commons:commons-lang3:3.20.0'
    implementation 'org.apache.httpcomponents:fluent-hc:4.5.14'
    implementation 'org.apache.pdfbox:pdfbox:3.0.7'
    implementation 'org.apache.pdfbox:pdfbox-tools:3.0.7'
    implementation 'us.dustinj.timezonemap:timezonemap:4.5'

    runtimeOnly 'ch.qos.logback:logback-classic'
    runtimeOnly 'com.github.luben:zstd-jni:1.5.7-9'
    runtimeOnly 'org.flywaydb:flyway-database-postgresql'
    runtimeOnly 'org.postgresql:postgresql:42.7.11'
    runtimeOnly 'org.yaml:snakeyaml'

    ksp 'io.micronaut:micronaut-inject-kotlin'
    ksp 'io.micronaut.validation:micronaut-validation-processor'
    kspTest 'io.micronaut:micronaut-inject-kotlin'
    kspTest 'io.micronaut.validation:micronaut-validation-processor'

    // Tests and test tools
    testImplementation 'io.micronaut.test:micronaut-test-junit5'
    testImplementation 'org.assertj:assertj-core:3.27.7'
    testImplementation 'com.h2database:h2:2.4.240'
    testImplementation 'com.google.code.gson:gson:2.14.0'
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.23.0'
    testImplementation "org.testcontainers:testcontainers-junit-jupiter:${testcontainersVersion}"
    testImplementation "org.testcontainers:testcontainers-postgresql:${testcontainersVersion}"
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
    jvmArgs '-Xshare:off'
    systemProperty 'logging.level', 'INFO'
}
