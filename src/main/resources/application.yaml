micronaut:
  application:
    name: PredictionsBot
  router:
    static-resources:
      default:
        enabled: true
        mapping: "/**"
        paths:
          - classpath:static
  views:
    folder: templates
    freemarker:
      enabled: true
      default-extension: ftlh
      recognize-standard-file-extensions: true
  http:
    services:
      api-football:
        url: ${connectors.api-football.url}

datasources:
  default:
    # Runtime credentials come from Vault or environment as datasources.default.*.
    driver-class-name: org.postgresql.Driver

jpa:
  default:
    packages-to-scan:
      - at.hrechny.predictionsbot.database.entity
    properties:
      hibernate:
        hbm2ddl:
          auto: validate

flyway:
  datasources:
    default:
      enabled: true
      locations:
        - classpath:db/migration
      baseline-on-migrate: true
      baseline-version: 1
      baseline-description: Existing production schema
      validate-on-migrate: true
      clean-disabled: true

caches:
  api-football:
    expire-after-write: ${connectors.api-football.minInterval:60}s

connectors:
  api-football:
    url: ${connectors.api-football.url}
    apiKey: ${connectors.api-football.apiKey}
    minInterval: ${connectors.api-football.minInterval:60}
    maxAttempts: ${connectors.api-football.maxAttempts}
    dayStarts: ${connectors.api-football.dayStarts}
  proxy:
    host: ${connectors.proxy.host:}
    port: ${connectors.proxy.port:0}
    username: ${connectors.proxy.username:}
    password: ${connectors.proxy.password:}

secrets:
  adminKey: ${secrets.adminKey}
  telegramKey: ${secrets.telegramKey}

telegram:
  token: ${telegram.token}
  reportTo: ${telegram.reportTo:}

schedulers:
  fixtures:
    enabled: ${schedulers.fixtures.enabled:true}
    cron: ${schedulers.fixtures.cron:0 0 0 * * *}

api-connectors:
  connectors:
    api-football:
      enabled: true
      data-types:
        - ROUNDS
        - SEASON_FIXTURES
        - LIVE_FIXTURES
        - SCORES
        - TEAMS
        - PROVIDER_METADATA
      freshness: NEAR_REAL_TIME
      health:
        derived-from-audit: true
  routing:
    fallback-order:
      - api-football
    merge-policy:
      strategy: PRIMARY_ONLY

application:
  url: ${application.url}

logger:
  levels:
    at.hrechny.predictionsbot: ${logging.level:INFO}
