spring:
  application:
    name: PredictionsBot
  jpa:
    hibernate.ddl-auto: validate
    database: postgresql
    open-in-view: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: Existing production schema
    validate-on-migrate: true
    clean-disabled: true
  datasource:
    url: ${spring.datasource.url}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: org.postgresql.Driver
  cloud:
    vault:
      enabled: ${SPRING_CLOUD_VAULT_ENABLED:true}
      authentication: TOKEN
      uri: ${VAULT_URI}
      token: ${VAULT_TOKEN}
      fail-fast: true
  config:
    import: ${SPRING_CONFIG_IMPORT:vault:///secret/${spring.application.name}}

connectors:
  api-football:
    url: ${connectors.api-football.url}
    apiKey: ${connectors.api-football.apiKey}
    minInterval: ${connectors.api-football.minInterval}
    maxAttempts: ${connectors.api-football.maxAttempts}
    dayStarts: ${connectors.api-football.dayStarts}

secrets:
  adminKey: ${secrets.adminKey}
  telegramKey: ${secrets.telegramKey}

telegram:
  token: ${telegram.token}

logging:
  level:
    at.hrechny.predictionsbot: ${logging.level}
