micronaut:
  application:
    name: PredictionsBot
  router:
    static-resources:
      default:
        enabled: true
        mapping: /**
        paths:
          - classpath:static
  views:
    folder: templates
    freemarker:
      enabled: true
      default-extension: ftlh
      recognize-standard-file-extensions: true

datasources:
  default:
    url: ${DATASOURCES_DEFAULT_URL:${SPRING_DATASOURCE_URL:}}
    username: ${DATASOURCES_DEFAULT_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
    password: ${DATASOURCES_DEFAULT_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    driver-class-name: org.postgresql.Driver

jpa:
  default:
    packages-to-scan:
      - at.hrechny.predictionsbot.database.entity
    properties:
      hibernate:
        hbm2ddl:
          auto: validate

flyway:
  datasources:
    default:
      enabled: true
      locations:
        - classpath:db/migration
      baseline-on-migrate: true
      baseline-version: 1
      baseline-description: Existing production schema
      validate-on-migrate: true
      clean-disabled: true

caches:
  api-football:
    expire-after-write: ${CONNECTORS_API_FOOTBALL_MIN_INTERVAL:60}s

connectors:
  api-football:
    url: ${CONNECTORS_API_FOOTBALL_URL:}
    apiKey: ${CONNECTORS_API_FOOTBALL_API_KEY:}
    minInterval: ${CONNECTORS_API_FOOTBALL_MIN_INTERVAL:60}
    maxAttempts: ${CONNECTORS_API_FOOTBALL_MAX_ATTEMPTS:0}
    dayStarts: ${CONNECTORS_API_FOOTBALL_DAY_STARTS:22:00}
  proxy:
    host: ${CONNECTORS_PROXY_HOST:}
    port: ${CONNECTORS_PROXY_PORT:0}
    username: ${CONNECTORS_PROXY_USERNAME:}
    password: ${CONNECTORS_PROXY_PASSWORD:}

secrets:
  adminKey: ${SECRETS_ADMIN_KEY:}
  telegramKey: ${SECRETS_TELEGRAM_KEY:}

telegram:
  token: ${TELEGRAM_TOKEN:}
  reportTo: ${TELEGRAM_REPORT_TO:}

application:
  url: ${APPLICATION_URL:}

logging:
  levels:
    at.hrechny.predictionsbot: ${LOGGING_LEVEL:INFO}
