micronaut:
  application:
    name: PredictionsBot
  router:
    static-resources:
      default:
        enabled: true
        mapping: "/**"
        paths:
          - classpath:static
  views:
    folder: templates
    freemarker:
      enabled: true
      default-extension: ftlh
      recognize-standard-file-extensions: true
datasources:
  default:
    # Runtime credentials come from Vault or environment as datasources.default.*.
    driver-class-name: org.postgresql.Driver

jpa:
  default:
    packages-to-scan:
      - at.hrechny.predictionsbot.database.entity
    properties:
      hibernate:
        hbm2ddl:
          auto: validate

flyway:
  datasources:
    default:
      enabled: true
      locations:
        - classpath:db/migration
      baseline-on-migrate: true
      baseline-version: 1
      baseline-description: Existing production schema
      validate-on-migrate: true
      clean-disabled: true

caches:
  api-football:
    expire-after-write: ${connectors.api-football.minInterval:60}s

api-connectors:
  connectors:
    api-football:
      enabled: true
      data-types:
        - ROUNDS
        - SEASON_FIXTURES
        - LIVE_FIXTURES
        - SCORES
        - TEAMS
        - PROVIDER_METADATA
      freshness: NEAR_REAL_TIME
      health:
        derived-from-audit: true
  routing:
    fallback-order:
      - api-football
    merge-policy:
      strategy: PRIMARY_ONLY

application:
  url: ${application.url}

logger:
  levels:
    at.hrechny.predictionsbot: ${logging.level:INFO}
