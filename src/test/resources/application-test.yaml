datasources:
  default:
    url: jdbc:h2:mem:predictions_micronaut;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: none
        dialect: org.hibernate.dialect.PostgreSQLDialect

flyway:
  datasources:
    default:
      enabled: false

application:
  url: http://localhost

secrets:
  adminKey: admin
